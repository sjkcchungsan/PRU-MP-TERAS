<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRU (Programme Remember & Understand) - 实巴荷中山学校</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=ZCOOL+KuaiLe&display=swap');
        
        :root { --tv-safe-gap: 3vw; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            background-color: #000;
            user-select: none;
        }

        /* 应用最大化容器 */
        .app-maximizer {
            width: 100vw; height: 100vh;
            position: fixed; inset: 0;
            overflow: hidden;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        /* 渐变背景 */
        .bg-home { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .bg-bm { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .bg-bc { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .bg-bi { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .bg-mt { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-sc { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .bg-sj { background: linear-gradient(135deg, #e6b980 0%, #eacda3 100%); }

        .card-pop { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .card-pop:hover { transform: scale(1.03); }

        .hidden-panel { display: none !important; }
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

        /* 巨型文字 */
        .giant-text { font-size: min(16vw, 32vh); line-height: 1; font-weight: 900; text-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .sub-giant-text { font-size: min(7vw, 13vh); font-weight: 700; opacity: 0.75; margin-bottom: 1rem; }

        /* 核心按钮置顶 */
        .control-btn {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 1.5vh 2.5vw;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 2vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            border: 3px solid white;
            z-index: 9999 !important;
            position: relative;
            cursor: pointer;
            pointer-events: auto !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-btn:active { transform: scale(0.95); }

        /* 三个核心操作按钮样式 */
        .action-btn {
            padding: 1.5vh 3vw;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 2.2vh;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .tv-corner { position: absolute; z-index: 9000; }
        .top-l { top: var(--tv-safe-gap); left: var(--tv-safe-gap); }
        .top-r { top: var(--tv-safe-gap); right: var(--tv-safe-gap); }
        .bottom-l { bottom: var(--tv-safe-gap); left: var(--tv-safe-gap); }
        .bottom-r { bottom: var(--tv-safe-gap); right: var(--tv-safe-gap); }
        .top-center { top: var(--tv-safe-gap); left: 50%; transform: translateX(-50%); }

        /* PDF 页面样式 */
        .print-page { background: white; padding: 50px; color: black; font-family: 'Times New Roman', "Microsoft YaHei", serif; }
        .print-table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 14pt; }
        .print-table th, .print-table td { border: 1.5pt solid #000; padding: 15px; text-align: left; vertical-align: middle; }
        
        ruby { font-size: 20pt; font-weight: bold; }
        rt { font-size: 10pt; font-weight: normal; font-style: italic; color: #444; }

        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #print-section { display: block !important; }
        }
    </style>
</head>
<body class="bg-home">

    <div class="app-maximizer">
        <!-- 封面入口 -->
        <div id="landing-page" class="h-full w-full flex flex-col items-center justify-center text-center p-10 fade-in">
            <div class="bg-white/40 backdrop-blur-2xl p-16 rounded-[4rem] shadow-2xl border-4 border-white/50 max-w-6xl w-full flex flex-row items-center gap-16">
                <img src="LOGO SEKOLAH.png" alt="校徽" class="h-[45vh] w-auto drop-shadow-2xl float-anim">
                <div class="text-left flex-1">
                    <h2 class="text-5xl font-bold text-blue-900 mb-6">实巴荷中山学校</h2>
                    <h1 class="text-5xl font-serif text-gray-800 font-bold mb-3">Remember & Understand</h1>
                    <h1 class="text-9xl font-black text-blue-950 tracking-tighter mb-10">(PRU)</h1>
                    <button onclick="enterSystem()" class="bg-blue-600 text-white px-20 py-8 rounded-full text-5xl font-black shadow-2xl hover:scale-105 transition active:scale-95">点击进入系统</button>
                </div>
            </div>
        </div>

        <!-- 主菜单 -->
        <div id="subject-menu" class="hidden-panel h-full w-full p-12 fade-in flex flex-col relative">
            <div class="flex justify-between items-center mb-6 relative z-[100]">
                <h3 id="menu-title" class="text-2xl font-black text-gray-700 uppercase tracking-widest">选择科目 / Pilih Subjek</h3>
                <button onclick="backToLanding()" class="control-btn">🏠 返回首页</button>
            </div>

            <!-- 科目九宫格 -->
            <div id="subject-grid" class="grid grid-cols-3 gap-8 max-w-[95%] mx-auto flex-1 items-center pb-20 relative z-20">
                <div onclick="selectSubject('BM')" class="card-pop bg-orange-400 p-10 rounded-[3rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-8xl mb-4">🌳</div><div class="text-4xl font-black">国语</div><div class="text-lg opacity-80 uppercase">Bahasa Melayu</div>
                </div>
                <div onclick="selectSubject('BC')" class="card-pop bg-red-500 p-10 rounded-[3rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-8xl mb-4">🏮</div><div class="text-4xl font-black">华语</div><div class="text-lg opacity-80 uppercase">Bahasa Cina</div>
                </div>
                <div onclick="selectSubject('BI')" class="card-pop bg-blue-500 p-10 rounded-[3rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-8xl mb-4">🚀</div><div class="text-4xl font-black">英语</div><div class="text-lg opacity-80 uppercase">English</div>
                </div>
                <div onclick="selectSubject('MT')" class="card-pop bg-purple-600 p-10 rounded-[3rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-8xl mb-4">🧪</div><div class="text-4xl font-black">数学</div><div class="text-lg opacity-80 uppercase">Matematik</div>
                </div>
                <div onclick="selectSubject('SC')" class="card-pop bg-green-500 p-10 rounded-[3rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-8xl mb-4">🔬</div><div class="text-4xl font-black">科学</div><div class="text-lg opacity-80 uppercase">Sains</div>
                </div>
                <div onclick="selectSubject('SJ')" class="card-pop bg-yellow-700 p-10 rounded-[3rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-8xl mb-4">🏛️</div><div class="text-4xl font-black">历史</div><div class="text-lg opacity-80 uppercase">Sejarah</div>
                </div>
            </div>

            <!-- 单元面板与三大操作按钮 -->
            <div id="folder-selection" class="hidden-panel max-w-7xl mx-auto bg-white/60 backdrop-blur-3xl p-10 rounded-[4rem] shadow-2xl border-4 border-white/70 flex-1 flex flex-col overflow-hidden relative">
                <div class="flex items-center justify-between mb-8 relative z-[200]">
                    <div class="flex items-center gap-6">
                        <button onclick="showSubjectMenu()" class="control-btn text-2xl">⬅️</button>
                        <h2 id="folder-view-title" class="text-5xl font-black text-gray-800 tracking-tight">请先选择单元</h2>
                    </div>
                    <!-- 三大核心按钮：不再隐藏 -->
                    <div class="flex items-center gap-4">
                        <button id="btn-quiz" onclick="startWithMode('quiz')" disabled class="action-btn bg-blue-600 text-white hover:bg-blue-700">🎮 闯关模式 (回答题目)</button>
                        <button id="btn-study" onclick="startWithMode('study')" disabled class="action-btn bg-amber-500 text-white hover:bg-amber-600">📖 学习模式 (温习)</button>
                        <button id="btn-print" onclick="openPrintPreview()" disabled class="action-btn bg-white text-gray-800 border-gray-200 hover:bg-gray-50">🖨️ 打印 PDF 练习</button>
                    </div>
                </div>
                <div id="folder-grid" class="grid grid-cols-4 gap-6 overflow-y-auto pr-2 pb-10 relative z-10"></div>
            </div>

            <div id="manager-btn-container" class="absolute bottom-6 left-0 w-full flex justify-center no-print">
                <button onclick="toggleManager()" class="bg-gray-900 text-white px-10 py-4 rounded-full hover:bg-black transition shadow-2xl font-bold">⚙️ 内容管理中心</button>
            </div>
        </div>

        <!-- 游戏与温习舞台 -->
        <div id="game-container" class="hidden-panel fixed inset-0 z-[2000] flex flex-col bg-home overflow-hidden">
            <div class="tv-corner top-l"><button onclick="showSubjectMenu()" class="control-btn">⬅ 返回</button></div>
            <div class="tv-corner top-center pointer-events-none"><div id="game-title" class="text-3xl font-black text-white drop-shadow-lg uppercase">PRU</div></div>
            <div class="tv-corner top-r"><div class="control-btn border-none min-w-[150px] text-center"><span id="progress-val" class="text-2xl">0/0</span></div></div>

            <div id="game-stage" class="flex-1 w-full flex flex-col items-center justify-center px-24 relative z-10"></div>
            <div id="feedback" class="absolute bottom-[20%] left-0 w-full text-center text-8xl font-black text-white drop-shadow-2xl transition-all duration-300 z-50"></div>

            <div class="tv-corner bottom-l flex gap-4">
                <div id="speak-action" class="invisible"><button id="speak-btn" class="control-btn">🔊 朗读</button></div>
                <div id="ai-action" class="invisible"><button id="ai-btn" class="control-btn bg-amber-50 text-amber-800">✨ AI 解析</button></div>
            </div>
            <div class="tv-corner bottom-r">
                <div id="next-action" class="invisible"><button id="next-btn" class="control-btn bg-blue-600 text-white border-none shadow-xl">下一个 ➔</button></div>
            </div>
        </div>
    </div>

    <!-- 管理中心弹窗 -->
    <div id="manager-modal" class="hidden-panel fixed inset-0 z-[5000] bg-black/95 backdrop-blur-xl flex items-center justify-center p-10">
        <div class="bg-white rounded-[3rem] w-full max-w-6xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-10 border-b flex justify-between bg-gray-50">
                <div><h2 class="text-3xl font-black">⚙️ 内容管理中心</h2><p>更新科目与单元数据</p></div>
                <button onclick="toggleManager()" class="text-6xl text-gray-300 hover:text-gray-900 transition">&times;</button>
            </div>
            <div id="category-tabs" class="px-10 py-4 flex gap-3 bg-white overflow-x-auto border-b"></div>
            <div class="flex-1 p-10 flex gap-8 overflow-hidden bg-white">
                <div class="w-1/3 flex flex-col border-r pr-6">
                    <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-xl text-blue-600">单元列表</h3><button onclick="addFolder()" class="bg-blue-600 text-white px-4 py-1 rounded-xl text-sm">+ 新增</button></div>
                    <div id="manager-folder-list" class="flex-1 overflow-y-auto space-y-2"></div>
                </div>
                <div class="w-2/3 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <label class="font-bold text-xl">编辑数据 (格式: 拼音,华语 或 题目,答案)</label>
                        <div class="flex gap-2">
                            <button onclick="generateAIQuestions()" class="text-sm bg-amber-100 text-amber-700 px-4 py-1 rounded-xl font-bold">✨ AI 出题</button>
                            <button onclick="generateAIPinyin()" class="text-sm bg-blue-100 text-blue-700 px-4 py-1 rounded-xl font-bold">✨ 补全拼音</button>
                        </div>
                    </div>
                    <textarea id="edit-area" class="flex-1 border-4 border-gray-100 bg-gray-50 rounded-3xl p-6 font-mono text-2xl outline-none focus:border-blue-400 transition"></textarea>
                </div>
            </div>
            <div class="p-8 bg-gray-50 border-t flex justify-end gap-4">
                <button onclick="deleteCurrentFolder()" class="mr-auto text-red-500 font-bold hover:underline">⚠️ 删除单元</button>
                <button onclick="toggleManager()" class="px-10 py-4 rounded-2xl bg-gray-200 font-bold">取消</button>
                <button onclick="saveChanges()" class="px-12 py-4 rounded-2xl bg-blue-600 text-white font-black shadow-lg">💾 保存更改</button>
            </div>
        </div>
    </div>

    <!-- PDF 预览面板 -->
    <div id="print-modal" class="hidden-panel fixed inset-0 z-[8000] bg-black/95 flex flex-col p-10">
        <div class="flex justify-between items-center text-white mb-6">
            <h2 class="text-4xl font-black tracking-tight">🖨️ PDF 预览 (Bahagian 1 & 2)</h2>
            <div class="flex gap-6">
                <button onclick="executePrint()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black text-2xl shadow-xl pointer-events-auto">开始打印 / PRINT</button>
                <button onclick="closePrintModal()" class="bg-white/20 px-12 py-5 rounded-2xl font-bold text-2xl pointer-events-auto">关闭 / CLOSE</button>
            </div>
        </div>
        <div id="print-preview-content" class="flex-1 bg-white rounded-3xl overflow-y-auto shadow-inner p-4"></div>
    </div>

    <div id="print-section" class="hidden"></div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-10 py-4 rounded-full z-[9999] opacity-0 transition-opacity font-bold">操作成功</div>

    <script>
        const apiKey = ""; 
        async function callGemini(p, s = "你是专业的教育助手") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, { method: 'POST', body: JSON.stringify({ contents:[{parts:[{text:p}]}], systemInstruction:{parts:[{text:s}]} }) });
                const d = await res.json(); 
                return d.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch(e) { return null; }
        }

        let masterData = {
            'BM': [{ name: "Unit 1", content: "se-ko-lah,sekolah\nbu-ku,buku" }],
            'BC': [{ name: "生词 1", content: "píng guǒ,苹果\nlǎo shī,老师" }],
            'BI': [{ name: "Vocab 1", content: "Apple,苹果\nBook,书本" }],
            'MT': [{ name: "乘法", content: "2x2,4\n5x5,25" }],
            'SC': [{ name: "科学", content: "Paru-paru,肺\nhi-dung,鼻子" }],
            'SJ': [{ name: "历史", content: "Sejarah,历史\nwa-ri-san,遗产" }]
        };

        let currentSub = '', currentFolderIdx = -1, currentMode = 'quiz', correctCount = 0, playedIndices = [], activeEditSub = 'BM', activeEditIdx = 0, lastWord = {q:'',a:''};

        function enterSystem() { 
            document.getElementById('landing-page').classList.add('hidden-panel'); 
            document.getElementById('subject-menu').classList.remove('hidden-panel'); 
        }

        function backToLanding() { 
            document.getElementById('subject-menu').classList.add('hidden-panel'); 
            document.getElementById('landing-page').classList.remove('hidden-panel'); 
            document.body.className='bg-home'; 
        }

        function showSubjectMenu() { 
            document.getElementById('game-container').classList.add('hidden-panel'); 
            document.getElementById('subject-menu').classList.remove('hidden-panel'); 
            document.getElementById('subject-grid').classList.remove('hidden-panel'); 
            document.getElementById('folder-selection').classList.add('hidden-panel'); 
            document.body.className='bg-home'; 
        }

        function selectSubject(sub) {
            currentSub = sub; 
            currentFolderIdx = -1; // 重置已选单元
            updateActionButtons();
            
            document.getElementById('subject-grid').classList.add('hidden-panel');
            const sel = document.getElementById('folder-selection'); 
            sel.classList.remove('hidden-panel');
            document.getElementById('folder-view-title').innerText = `请选择科目 (${sub}) 的单元`;
            
            const grid = document.getElementById('folder-grid'); grid.innerHTML = '';
            masterData[sub].forEach((f, i) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl shadow-lg border-4 border-gray-100 flex items-center justify-center h-32 card-pop text-2xl font-black text-gray-700";
                card.innerText = f.name;
                card.onclick = () => {
                    currentFolderIdx = i;
                    document.querySelectorAll('#folder-grid > div').forEach(d => d.classList.remove('border-blue-500','bg-blue-50'));
                    card.classList.add('border-blue-500','bg-blue-50');
                    updateActionButtons();
                };
                grid.appendChild(card);
            });
        }

        function updateActionButtons() {
            const hasSelection = currentFolderIdx !== -1;
            document.getElementById('btn-quiz').disabled = !hasSelection;
            document.getElementById('btn-study').disabled = !hasSelection;
            document.getElementById('btn-print').disabled = !hasSelection;
            if(hasSelection) {
                document.getElementById('folder-view-title').innerText = `已选单元: ${masterData[currentSub][currentFolderIdx].name}`;
            }
        }

        function startWithMode(mode) {
            if(currentFolderIdx === -1) return;
            currentMode = mode;
            correctCount = 0; playedIndices = [];
            document.getElementById('subject-menu').classList.add('hidden-panel');
            document.getElementById('game-container').classList.remove('hidden-panel');
            document.body.className = `bg-${currentSub.toLowerCase()}`;
            document.getElementById('game-title').innerText = currentSub + " - " + (mode === 'quiz' ? '闯关回答' : '学习温习');
            renderLevel();
        }

        function renderLevel() {
            const stage = document.getElementById('game-stage'); stage.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('speak-action').className = 'invisible';
            document.getElementById('ai-action').className = 'invisible';
            document.getElementById('next-action').className = 'invisible';

            const folder = masterData[currentSub][currentFolderIdx];
            const raw = folder.content.split('\n').filter(l => l.includes(','));
            if(playedIndices.length >= raw.length) { renderEnd(raw.length); return; }
            document.getElementById('progress-val').innerText = `${playedIndices.length+1} / ${raw.length}`;

            let nextIdx = (currentMode === 'study') ? playedIndices.length : (() => {
                let av = []; for(let i=0;i<raw.length;i++) if(!playedIndices.includes(i)) av.push(i);
                return av[Math.floor(Math.random()*av.length)];
            })();
            const [q, a] = raw[nextIdx].split(',').map(s => s.trim());
            lastWord = { q, a };

            if(currentMode === 'study') {
                let html = '';
                if(['BC','SC','SJ'].includes(currentSub)) {
                    html = `<div class="sub-giant-text text-white/50">${q}</div><div class="giant-text text-white">${a}</div>`;
                } else if(currentSub === 'BM') {
                    html = `<div class="sub-giant-text text-white/50 uppercase">${q}</div><div class="giant-text text-white uppercase">${a}</div>`;
                } else {
                    html = `<div class="giant-text text-white uppercase">${q}</div><div class="sub-giant-text text-white/50 uppercase">${a}</div>`;
                }
                stage.innerHTML = `<div class="text-center animate-score">${html}</div>`;
                document.getElementById('speak-action').className = 'visible';
                document.getElementById('next-action').className = 'visible';
                document.getElementById('speak-btn').onclick = () => speak(a, (currentSub==='BC'||currentSub==='SC'||currentSub==='SJ')?'zh-CN':(currentSub==='BM'?'ms-MY':'en-SG'));
                document.getElementById('next-btn').onclick = () => { playedIndices.push(nextIdx); renderLevel(); };
            } else {
                playedIndices.push(nextIdx);
                renderQuiz(q, a, raw);
            }
        }

        function renderQuiz(q, a, raw) {
            const stage = document.getElementById('game-stage');
            const displayQ = (['BC','SC','SJ'].includes(currentSub)) ? q : q.toUpperCase();
            stage.innerHTML = `<div class="giant-text text-white mb-16">${displayQ} = ?</div>`;
            const grid = document.createElement('div'); grid.className = "grid grid-cols-2 gap-20 w-full max-w-5xl relative z-20";
            let opts = [a]; 
            while(opts.length < 2) {
                let r = raw[Math.floor(Math.random()*raw.length)].split(',')[1].trim();
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random()-0.5).forEach(o => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-12 rounded-[4rem] text-[8rem] font-black shadow-2xl active:scale-95 transition pointer-events-auto";
                btn.innerText = o.toUpperCase();
                btn.onclick = () => {
                    const fb = document.getElementById('feedback');
                    if(o === a) { correctCount++; fb.innerText = "🌟 正确 / BETUL!"; setTimeout(renderLevel, 1200); }
                    else { fb.innerText = "❌ 错误 / SALAH!"; setTimeout(renderLevel, 1200); }
                };
                grid.appendChild(btn);
            });
            stage.appendChild(grid);
        }

        function renderEnd(total) {
            const stage = document.getElementById('game-stage');
            stage.innerHTML = `<div class="text-center text-white"><div class="text-8xl font-black mb-10">完成挑战 / DONE!</div>
                <div class="text-[12rem] leading-none mb-10">${correctCount} / ${total}</div>
                <button onclick="showSubjectMenu()" class="bg-white text-blue-900 px-24 py-8 rounded-full text-5xl font-black shadow-2xl hover:scale-105 transition pointer-events-auto">确定</button></div>`;
        }

        function openPrintPreview() {
            if(currentFolderIdx === -1) return;
            const f = masterData[currentSub][currentFolderIdx];
            const raw = f.content.split('\n').filter(l => l.includes(','));
            const isChineseSub = ['BC','SC','SJ'].includes(currentSub);

            let h = `<div class="print-page">
                <div style="text-align:center; border-bottom:4pt solid black; padding-bottom:15px; margin-bottom:30px;">
                    <h1 style="margin:0; font-size:26pt;">PRU Programme - SJK(C) Chung San</h1>
                    <h2 style="margin:10pt 0; font-size:18pt;">科目: ${currentSub} | 单元: ${f.name}</h2>
                </div>
                
                <h3 style="background:#f0f0f0; padding:10px; border-left:8px solid #333;">Bahagian 1: 复习页 (题目与华语答案对照)</h3>
                <table class="print-table">
                    <thead><tr style="background:#eee;"><th width="10%">#</th><th>题目 / Kandungan</th><th>华语答案 / Jawapan</th></tr></thead>
                    <tbody>${raw.map((l, i) => { 
                        const [q, a] = l.split(','); 
                        const displayA = isChineseSub ? `<ruby>${a}<rt>${q}</rt></ruby>` : `<b>${a}</b>`;
                        return `<tr><td>${i+1}</td><td>${q}</td><td>${displayA}</td></tr>` 
                    }).join('')}</tbody>
                </table>

                <div style="page-break-before: always;"></div>

                <div style="text-align:center; border-bottom:3pt solid black; padding-bottom:15px; margin-bottom:30px;">
                    <h1 style="margin:0; font-size:24pt;">Latihan Kendiri (自修自检)</h1>
                    <h2 style="margin:5px 0;">科目: ${currentSub} | 单元: ${f.name}</h2>
                </div>
                <h3 style="background:#f0f0f0; padding:10px; border-left:8px solid #333;">Bahagian 2: 练习页 (请写出对应的华语答案)</h3>
                <table class="print-table">
                    <thead><tr style="background:#eee;"><th width="10%">#</th><th>题目 (拼音/提示)</th><th width="45%">你的华语答案</th></tr></thead>
                    <tbody>${raw.map((l, i) => { 
                        const [q, a] = l.split(','); 
                        return `<tr><td style="height:65px;">${i+1}</td><td style="font-size:18pt; font-weight:bold;">${q}</td><td></td></tr>` 
                    }).join('')}</tbody>
                </table>
            </div>`;
            document.getElementById('print-preview-content').innerHTML = h;
            document.getElementById('print-modal').classList.remove('hidden-panel');
        }

        function executePrint() { document.getElementById('print-section').innerHTML = document.getElementById('print-preview-content').innerHTML; window.print(); }
        function closePrintModal() { document.getElementById('print-modal').classList.add('hidden-panel'); }

        function toggleManager() { document.getElementById('manager-modal').classList.toggle('hidden-panel'); renderManagerTabs(); renderManagerFolders(); }
        function renderManagerTabs() {
            const tabs = document.getElementById('category-tabs'); tabs.innerHTML = '';
            Object.keys(masterData).forEach(s => {
                const b = document.createElement('button'); b.className = `px-6 py-2 rounded-xl font-bold transition ${activeEditSub===s?'bg-blue-600 text-white shadow-md':'bg-white text-gray-400'}`;
                b.innerText = s; b.onclick = () => { activeEditSub = s; activeEditIdx = 0; renderManagerTabs(); renderManagerFolders(); loadArea(); };
                tabs.appendChild(b);
            });
        }
        function renderManagerFolders() {
            const list = document.getElementById('manager-folder-list'); list.innerHTML = '';
            masterData[activeEditSub].forEach((f, i) => {
                const d = document.createElement('div'); d.className = `p-4 rounded-xl cursor-pointer transition ${activeEditIdx===i?'bg-blue-50 text-blue-600 border-l-8 border-blue-600 font-black':'bg-gray-50'}`;
                d.innerText = f.name; d.onclick = () => { activeEditIdx = i; renderManagerFolders(); loadArea(); };
                list.appendChild(d);
            });
        }
        function loadArea() { const f = masterData[activeEditSub][activeEditIdx]; document.getElementById('edit-area').value = f?f.content:''; }
        function saveChanges() { masterData[activeEditSub][activeEditIdx].content = document.getElementById('edit-area').value; showToast("✅ 保存成功！"); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(()=>t.style.opacity='0', 2000); }
        function addFolder() { const n = prompt("单元名称:"); if(n) { masterData[activeEditSub].push({name:n, content:''}); activeEditIdx = masterData[activeEditSub].length-1; renderManagerFolders(); loadArea(); } }
        function deleteCurrentFolder() { if(confirm("确定删除单元吗？")) { masterData[activeEditSub].splice(activeEditIdx, 1); activeEditIdx = 0; renderManagerFolders(); loadArea(); } }

        function speak(t, l) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(t);
            msg.lang = l; msg.rate = 0.7; window.speechSynthesis.speak(msg);
        }

        async function generateAIPinyin() {
            const a = document.getElementById('edit-area'); if(!a.value) return;
            const res = await callGemini(`为以下列表补全拼音，格式：拼音,华语。列表：\n${a.value}`, "你是拼音专家");
            if(res) a.value = res.trim();
        }
        async function generateAIQuestions() {
            const a = document.getElementById('edit-area');
            const res = await callGemini(`为科目 ${activeEditSub} 生成10组练习，格式：拼音,华语。`, "教材专家");
            if(res) a.value = res.trim();
        }
    </script>
</body>
</html>
