<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRU (Programme Remember & Understand) - 实巴荷中山学校</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=ZCOOL+KuaiLe&display=swap');
        
        :root { 
            --tv-safe-gap: 5vw; 
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; margin: 0; height: 100vh; width: 100vw;
            background-color: #000; user-select: none;
            color: white;
        }

        .app-maximizer {
            width: 100vw; height: 100vh; position: fixed; inset: 0;
            overflow: hidden; display: flex; flex-direction: column; z-index: 10;
        }

        /* 各科目渐变背景 */
        .bg-home { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .bg-bm { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .bg-bc { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .bg-bi { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .bg-mt { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-sc { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .bg-sj { background: linear-gradient(135deg, #e6b980 0%, #eacda3 100%); }

        .card-pop { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .card-pop:hover { transform: scale(1.03); }

        .hidden-panel { display: none !important; }
        
        /* 文本阴影增强 */
        .outline-shadow {
            text-shadow: 2px 2px 3px #000, -2px -2px 3px #000, 2px -2px 3px #000, -2px 2px 3px #000;
        }

        /* Suku Kata 颜色方案 */
        .suku-0 { color: #ffffff; } 
        .suku-1 { color: #ffff00; } 
        .suku-2 { color: #00ffff; } 
        .suku-3 { color: #00ff00; } 
        .suku-4 { color: #ff69b4; } 

        .giant-text { font-size: min(12vw, 15vh); line-height: 1.1; }

        .safe-area-wrapper {
            padding: 2vh var(--tv-safe-gap);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            padding: 1.2vh 2vw; border-radius: 2rem; font-weight: 900; font-size: 1.8vh;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 3px solid white;
            z-index: 9999 !important; position: relative; cursor: pointer; color: #333;
        }

        .action-btn {
            padding: 1.2vh 2.5vw; border-radius: 2rem; font-weight: 900; font-size: 2vh;
            border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.2s; cursor: pointer;
        }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .tv-corner { position: absolute; z-index: 9000; }
        .top-l { top: 3vh; left: 3vw; }
        .top-r { top: 3vh; right: 3vw; }
        .bottom-l { bottom: 3vh; left: 3vw; }
        .bottom-r { bottom: 3vh; right: 3vw; }
        .top-center { top: 3vh; left: 50%; transform: translateX(-50%); }

        #feedback {
            position: absolute;
            top: 28%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            font-size: 11vh;
            font-weight: 900;
            transition: opacity 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* PDF 打印核心样式 */
        .print-page { 
            background: white; 
            padding: 2.54cm; 
            color: black; 
            font-family: "Times New Roman", serif; 
            width: 210mm;
            min-height: 297mm;
            box-sizing: border-box;
            margin: 0 auto;
        }
        .print-header { text-align: center; border-bottom: 2pt solid black; margin-bottom: 15px; padding-bottom: 5px; }
        .print-meta { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; font-size: 12pt; }
        .print-table { width: 100%; border-collapse: collapse; }
        .print-table th, .print-table td { border: 1pt solid #000; padding: 8px; text-align: left; vertical-align: middle; font-size: 11pt; }
        .print-pinyin { font-size: 10pt; color: #333; display: block; margin-bottom: 2px; }
        .print-hanzi { font-size: 14pt; font-weight: bold; }
        .print-meaning { font-size: 11pt; font-style: italic; color: #555; }
        .page-title { background: #f2f2f2; padding: 6px 12px; border-left: 6px solid #000; font-size: 13pt; font-weight: bold; margin-bottom: 15px; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #print-section { display: block !important; width: 100% !important; }
            .print-page { 
                page-break-after: always; 
                border: none; 
                box-shadow: none;
                width: 210mm;
                height: 297mm;
                padding: 2.54cm; 
            }
        }
    </style>
</head>
<body class="bg-home">

    <div class="app-maximizer">
        <!-- 封面入口 -->
        <div id="landing-page" class="h-full w-full flex flex-col items-center justify-center text-center p-10 fade-in">
            <div class="bg-white/40 backdrop-blur-2xl p-16 rounded-[4rem] shadow-2xl border-4 border-white/50 max-w-6xl w-full flex flex-row items-center gap-16">
                <img src="LOGO SEKOLAH.png" alt="校徽" class="h-[40vh] w-auto drop-shadow-2xl float-anim" onerror="this.src='https://via.placeholder.com/400x400?text=LOGO'">
                <div class="text-left flex-1">
                    <h2 class="text-5xl font-bold text-blue-900 mb-6">实巴荷中山学校</h2>
                    <h1 class="text-4xl font-serif text-gray-800 font-bold mb-3">Remember & Understand</h1>
                    <h1 class="text-9xl font-black text-blue-950 tracking-tighter mb-10">(PRU)</h1>
                    <button onclick="enterSystem()" class="bg-blue-600 text-white px-16 py-6 rounded-full text-4xl font-black shadow-2xl hover:scale-105 transition">MASUK / 进入</button>
                </div>
            </div>
        </div>

        <!-- 科目菜单 -->
        <div id="subject-menu" class="hidden-panel h-full w-full p-12 fade-in flex flex-col relative">
            <div class="flex justify-between items-center mb-6 relative z-[100] px-8">
                <h3 class="text-xl font-black text-gray-700 uppercase tracking-widest">Pilih Subjek / 选择科目</h3>
                <button onclick="backToLanding()" class="control-btn" id="btn-home-home">🏠</button>
            </div>

            <div id="subject-grid" class="grid grid-cols-3 gap-6 max-w-[85%] mx-auto flex-1 items-center pb-20 relative z-20">
                <div onclick="selectSubject('BM')" class="card-pop bg-orange-400 p-8 rounded-[2.5rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-7xl mb-4">🌳</div><div class="text-3xl font-black">国语</div><div class="text-sm opacity-80 uppercase">Bahasa Melayu</div>
                </div>
                <div onclick="selectSubject('BC')" class="card-pop bg-red-500 p-8 rounded-[2.5rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-7xl mb-4">🏮</div><div class="text-3xl font-black">华语</div><div class="text-sm opacity-80 uppercase">Bahasa Cina</div>
                </div>
                <div onclick="selectSubject('BI')" class="card-pop bg-blue-500 p-8 rounded-[2.5rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-7xl mb-4">🚀</div><div class="text-3xl font-black">英语</div><div class="text-sm opacity-80 uppercase">English</div>
                </div>
                <div onclick="selectSubject('MT')" class="card-pop bg-purple-600 p-8 rounded-[2.5rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-7xl mb-4">🧪</div><div class="text-3xl font-black">数学</div><div class="text-sm opacity-80 uppercase">Matematik</div>
                </div>
                <div onclick="selectSubject('SC')" class="card-pop bg-green-500 p-8 rounded-[2.5rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-7xl mb-4">🔬</div><div class="text-3xl font-black">科学</div><div class="text-sm opacity-80 uppercase">Sains</div>
                </div>
                <div onclick="selectSubject('SJ')" class="card-pop bg-yellow-700 p-8 rounded-[2.5rem] text-white text-center shadow-xl border-4 border-white/30 h-full flex flex-col justify-center">
                    <div class="text-7xl mb-4">🏛️</div><div class="text-3xl font-black">历史</div><div class="text-sm opacity-80 uppercase">Sejarah</div>
                </div>
            </div>

            <!-- 单元选择 -->
            <div id="folder-selection" class="hidden-panel max-w-6xl mx-auto bg-white/60 backdrop-blur-3xl p-8 rounded-[3.5rem] shadow-2xl border-4 border-white/70 flex-1 flex flex-col overflow-hidden relative">
                <div class="flex items-center justify-between mb-8 relative z-[200]">
                    <div class="flex items-center gap-6">
                        <button onclick="showSubjectMenu()" class="control-btn text-xl" id="btn-back-subject">⬅️</button>
                        <h2 id="folder-view-title" class="text-3xl font-black text-gray-800">Sila Pilih Unit</h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <button id="btn-quiz" onclick="startWithMode('quiz')" disabled class="action-btn bg-blue-600 text-white">🎮 Jawab Soalan</button>
                        <button id="btn-study" onclick="startWithMode('study')" disabled class="action-btn bg-amber-500 text-white">📖 Nota Pembelajaran</button>
                        <button id="btn-print" onclick="openPrintPreview()" disabled class="action-btn bg-white text-gray-800 border-gray-200">🖨️ PDF</button>
                    </div>
                </div>
                <div id="folder-grid" class="grid grid-cols-4 gap-4 overflow-y-auto pr-2 pb-10 relative z-10"></div>
            </div>

            <div id="manager-btn-container" class="absolute bottom-6 left-0 w-full flex justify-center no-print">
                <button onclick="toggleManager()" class="bg-gray-900 text-white px-8 py-3 rounded-full shadow-2xl font-bold">⚙️ 管理中心</button>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div id="game-container" class="hidden-panel fixed inset-0 z-[2000] flex flex-col bg-home overflow-hidden">
            <div class="tv-corner top-l"><button onclick="exitGameAndStopAudio()" class="control-btn" id="btn-game-back">⬅ KEMBALI</button></div>
            <div class="tv-corner top-center pointer-events-none"><div id="game-title" class="text-2xl font-black text-white drop-shadow-lg uppercase">PRU</div></div>
            <div class="tv-corner top-r"><div class="control-btn border-none min-w-[100px] text-center"><span id="progress-val" class="text-xl font-black">0/0</span></div></div>

            <div class="safe-area-wrapper">
                <div id="feedback" class="outline-shadow"></div>
                <div id="game-stage" class="w-full flex flex-col items-center justify-center"></div>
            </div>

            <div class="tv-corner bottom-l flex gap-4">
                <div id="prev-action" class="invisible"><button id="prev-btn" class="control-btn">⬅ SEBELUMNYA</button></div>
                <div id="speak-action" class="invisible"><button id="speak-btn" class="control-btn">🔊 SEBUT</button></div>
            </div>
            <div class="tv-corner bottom-r">
                <div id="next-action" class="invisible"><button id="next-btn" class="control-btn bg-blue-600 text-white border-none shadow-xl">SETERUSNYA ➔</button></div>
            </div>
        </div>
    </div>

    <!-- 管理中心 -->
    <div id="manager-modal" class="hidden-panel fixed inset-0 z-[5000] bg-black/95 backdrop-blur-xl flex items-center justify-center p-10">
        <div class="bg-white rounded-[3rem] w-full max-w-6xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl text-gray-800">
            <div class="p-8 border-b flex justify-between bg-gray-50">
                <h2 class="text-3xl font-black">⚙️ 内容管理中心</h2>
                <button onclick="toggleManager()" class="text-6xl text-gray-300 hover:text-gray-900 transition">&times;</button>
            </div>
            <div id="category-tabs" class="px-10 py-4 flex gap-2 bg-white border-b"></div>
            <div class="flex-1 p-10 flex gap-8 overflow-hidden">
                <div class="w-1/3 border-r pr-6">
                    <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-xl">单元列表</h3><button onclick="addFolder()" class="bg-blue-600 text-white px-4 py-1 rounded-xl">+ 新增</button></div>
                    <div id="manager-folder-list" class="space-y-2"></div>
                </div>
                <div class="w-2/3 flex flex-col">
                    <label class="font-bold text-xl mb-4">编辑数据 (BM格式: se-ko-lah,sekolah)</label>
                    <textarea id="edit-area" class="flex-1 border-4 border-gray-100 bg-gray-50 rounded-3xl p-6 font-mono text-xl outline-none focus:border-blue-400"></textarea>
                </div>
            </div>
            <div class="p-8 bg-gray-50 border-t flex justify-end gap-4">
                <button onclick="saveChanges()" class="px-12 py-4 rounded-2xl bg-blue-600 text-white font-black shadow-lg">💾 保存更改</button>
            </div>
        </div>
    </div>

    <!-- PDF 预览面板 -->
    <div id="print-modal" class="hidden-panel fixed inset-0 z-[8000] bg-black/95 flex flex-col p-10 no-print">
        <div class="flex justify-between items-center text-white mb-6">
            <h2 class="text-4xl font-black">🖨️ PDF 预览 (A4 练习卷)</h2>
            <div class="flex gap-6">
                <button onclick="executePrint()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black text-2xl shadow-xl hover:bg-blue-500">PRINT</button>
                <button onclick="closePrintModal()" class="bg-white/20 px-12 py-5 rounded-2xl font-bold text-2xl hover:bg-white/30">CLOSE</button>
            </div>
        </div>
        <div id="print-preview-content" class="flex-1 bg-gray-200 rounded-3xl overflow-y-auto p-10 shadow-inner"></div>
    </div>

    <div id="print-section" class="hidden"></div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-10 py-4 rounded-full z-[9999] opacity-0 transition-opacity font-bold">OK</div>

    <script>
        var masterData = {
            'BM': [{ name: "Unit 1", content: "se-ko-lah,sekolah\nme-ja,meja\nke-ru-si,kerusi\nbu-ku,buku" }],
            'BC': [{ name: "生词 1", content: "苹果\n老师\n同学" }],
            'BI': [{ name: "Vocab 1", content: "Apple,苹果\nTeacher,老师\nStudent,学生" }],
            'MT': [{ name: "Multiply", content: "2x2,4\n5x5,25" }],
            'SC': [{ name: "Sains 1", content: "肺,肺\n心脏,心脏\n氧气,氧气" }],
            'SJ': [{ name: "Sejarah 1", content: "历史,历史\n文化,文化\n文明,文明\n遗产,遗产" }]
        };

        var currentSub = '', currentFolderIdx = -1, currentMode = 'quiz', correctCount = 0, playedIndices = [], activeEditSub = 'BM', activeEditIdx = 0;
        var historyStep = -1;

        const uiText = {
            'BM': { back: '⬅ KEMBALI', prev: '⬅ SEBELUMNYA', next: 'SETERUSNYA ➔', speak: '🔊 SEBUT', quiz: '🎮 Jawab Soalan', study: '📖 Nota Pembelajaran', print: '🖨️ PDF', name: 'Nama', kelas: 'Kelas', bil: 'Bil', question: 'Soalan', answer: 'Jawapan', betul: 'BETUL!', salah: 'SALAH!' },
            'BC': { back: '⬅ 返回', prev: '⬅ 上一题', next: '下一个 ➔', speak: '🔊 朗读', quiz: '🎮 闯关模式', study: '📖 温习笔记', print: '🖨️ 保存PDF', name: '姓名', kelas: '班级', bil: '编号', question: '题目内容', answer: '答案词汇', betul: '正确！', salah: '错误！' },
            'BI': { back: '⬅ BACK', prev: '⬅ PREVIOUS', next: 'NEXT ➔', speak: '🔊 SPEAK', quiz: '🎮 Quiz Mode', study: '📖 Study Mode', print: '🖨️ Save PDF', name: 'Name', kelas: 'Class', bil: 'No.', question: 'Question', answer: 'Answer', betul: 'CORRECT!', salah: 'WRONG!' },
            'SC': { back: '⬅ 返回', prev: '⬅ 上一题', next: '下一个 ➔', speak: '🔊 朗读', quiz: '🎮 闯关模式', study: '📖 温习笔记', print: '🖨️ 保存PDF', name: '姓名', kelas: '班级', bil: '编号', question: '题目内容', answer: '答案词汇', betul: '正确！', salah: '错误！' },
            'SJ': { back: '⬅ 返回', prev: '⬅ 上一题', next: '下一个 ➔', speak: '🔊 朗读', quiz: '🎮 闯关模式', study: '📖 温习笔记', print: '🖨️ 保存PDF', name: '姓名', kelas: '班级', bil: '编号', question: '题目内容', answer: '答案词汇', betul: '正确！', salah: '错误！' }
        };

        function autoPinyin(text) {
            if (!text || !/[\u4e00-\u9fa5]/.test(text)) return text;
            try { return pinyinPro.pinyin(text, { toneType: 'symbol' }); } catch (e) { return text; }
        }

        function getColoredSukuKata(text, hideHyphen = false) {
            if (!text || !text.includes('-')) return `<span class="suku-0 outline-shadow">${text || ''}</span>`;
            return text.split('-').map((s, i) => `<span class="suku-${i % 5} outline-shadow">${s}</span>`).join(hideHyphen ? '' : '<span class="opacity-40 mx-0.5 outline-shadow">-</span>');
        }

        function getUI(key) {
            const lang = uiText[currentSub] ? currentSub : 'BM';
            return uiText[lang][key] || uiText['BM'][key];
        }

        function enterSystem() { 
            document.getElementById('landing-page').classList.add('hidden-panel'); 
            document.getElementById('subject-menu').classList.remove('hidden-panel'); 
        }

        function backToLanding() { 
            document.getElementById('subject-menu').classList.add('hidden-panel'); 
            document.getElementById('landing-page').classList.remove('hidden-panel'); 
            document.body.className='bg-home'; 
        }

        function showSubjectMenu() { 
            stopAllAudioLogic();
            document.getElementById('game-container').classList.add('hidden-panel'); 
            document.getElementById('subject-menu').classList.remove('hidden-panel'); 
            document.getElementById('subject-grid').classList.remove('hidden-panel'); 
            document.getElementById('folder-selection').classList.add('hidden-panel'); 
            document.body.className='bg-home'; 
        }

        function exitGameAndStopAudio() {
            stopAllAudioLogic();
            document.getElementById('game-container').classList.add('hidden-panel');
            document.getElementById('subject-menu').classList.remove('hidden-panel');
            document.getElementById('folder-selection').classList.remove('hidden-panel');
            document.getElementById('subject-grid').classList.add('hidden-panel');
        }

        function stopAllAudioLogic() { window.speechSynthesis.cancel(); }

        function selectSubject(sub) {
            currentSub = sub; currentFolderIdx = -1; updateActionButtons();
            document.getElementById('subject-grid').classList.add('hidden-panel');
            document.getElementById('folder-selection').classList.remove('hidden-panel');
            document.getElementById('folder-view-title').innerText = `Unit: ${sub}`;
            document.getElementById('btn-back-subject').innerText = getUI('back');
            document.getElementById('btn-quiz').innerText = getUI('quiz');
            document.getElementById('btn-study').innerText = getUI('study');
            document.getElementById('btn-print').innerText = getUI('print');

            const grid = document.getElementById('folder-grid'); grid.innerHTML = '';
            if (!masterData[sub]) return;
            masterData[sub].forEach((f, i) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-lg border-4 border-gray-100 flex items-center justify-center h-24 card-pop text-lg font-black text-gray-700 text-center";
                card.innerText = f.name;
                card.onclick = () => {
                    currentFolderIdx = i;
                    document.querySelectorAll('#folder-grid > div').forEach(d => d.classList.remove('border-blue-500','bg-blue-50'));
                    card.classList.add('border-blue-500','bg-blue-50');
                    updateActionButtons();
                };
                grid.appendChild(card);
            });
        }

        function updateActionButtons() {
            const has = currentFolderIdx !== -1;
            ['btn-quiz','btn-study','btn-print'].forEach(id => document.getElementById(id).disabled = !has);
        }

        function startWithMode(mode) {
            currentMode = mode; correctCount = 0; playedIndices = []; historyStep = -1;
            document.getElementById('subject-menu').classList.add('hidden-panel');
            document.getElementById('game-container').classList.remove('hidden-panel');
            document.body.className = `bg-${currentSub.toLowerCase()}`;
            document.getElementById('btn-game-back').innerText = getUI('back');
            document.getElementById('prev-btn').innerText = getUI('prev');
            document.getElementById('speak-btn').innerText = getUI('speak');
            document.getElementById('next-btn').innerText = getUI('next');
            document.getElementById('game-title').innerText = currentSub + " - " + (mode === 'quiz' ? getUI('quiz') : getUI('study'));
            renderLevel();
        }

        function getLangCode() {
            const map = { 'BM': 'ms-MY', 'BC': 'zh-CN', 'BI': 'en-US', 'SC': 'zh-CN', 'SJ': 'zh-CN' };
            return map[currentSub] || 'zh-CN';
        }

        function renderLevel(moveStep = 1) {
            stopAllAudioLogic();
            const stage = document.getElementById('game-stage'); stage.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('feedback').style.opacity = '0';
            document.getElementById('speak-action').className = 'invisible';
            document.getElementById('next-action').className = 'visible';
            document.getElementById('prev-action').className = 'invisible';

            const folder = masterData[currentSub][currentFolderIdx];
            const rawLines = folder.content.split('\n').filter(l => l.trim() !== '');
            
            historyStep += moveStep;
            if(historyStep >= rawLines.length) { renderEnd(rawLines.length); return; }
            if(historyStep > 0) document.getElementById('prev-action').className = 'visible';
            document.getElementById('progress-val').innerText = `${historyStep + 1}/${rawLines.length}`;

            let vocabIdx;
            if (currentMode === 'study') { vocabIdx = historyStep; } 
            else {
                if (!playedIndices[historyStep]) {
                    let av = []; for(let i=0; i<rawLines.length; i++) if(!playedIndices.includes(i)) av.push(i);
                    vocabIdx = av.length > 0 ? av[Math.floor(Math.random() * av.length)] : 0;
                    playedIndices[historyStep] = vocabIdx;
                } else { vocabIdx = playedIndices[historyStep]; }
            }

            let meaning = "", hanzi = "", pinyin = "";
            const line = rawLines[vocabIdx];
            if (line.includes(',')) { [meaning, hanzi] = line.split(',').map(s => s.trim()); }
            else { hanzi = line.trim(); meaning = ""; }
            pinyin = autoPinyin(hanzi);

            document.getElementById('next-btn').onclick = () => renderLevel(1);
            document.getElementById('prev-btn').onclick = () => renderLevel(-1);

            if(currentMode === 'study') renderStudy(pinyin, hanzi, meaning);
            else renderQuiz(pinyin, hanzi, meaning, rawLines);
        }

        function renderStudy(pinyin, hanzi, meaning) {
            const stage = document.getElementById('game-stage');
            document.getElementById('speak-action').className = 'visible';
            document.getElementById('speak-btn').onclick = () => { stopAllAudioLogic(); speak(hanzi, getLangCode()); };

            let contentHTML = '';
            if (currentSub === 'BM') {
                contentHTML = `<div class="text-[8vh] mb-12">🔊</div><div class="giant-text tracking-normal text-center uppercase font-black">${getColoredSukuKata(meaning, true)}</div>`;
            } else if (['BC', 'SJ', 'SC'].includes(currentSub)) {
                contentHTML = `
                    <div class="text-[7vh] mb-4">🔊</div>
                    <div class="flex flex-col items-center text-center">
                        <div class="pinyin-text text-5xl mb-4 font-bold uppercase tracking-widest outline-shadow">${pinyin}</div>
                        <div class="hanzi-text giant-text mb-6 outline-shadow">${hanzi}</div>
                        ${meaning ? `<div class="meaning-text text-5xl outline-shadow">${meaning}</div>` : ''}
                    </div>`;
            } else {
                contentHTML = `<div class="text-[8vh] mb-8">🔊</div><div class="text-center"><div class="hanzi-text giant-text mb-4 uppercase outline-shadow">${meaning}</div><div class="text-4xl text-white/50">${hanzi}</div></div>`;
            }
            stage.innerHTML = `<div class="flex flex-col items-center justify-center w-full px-8">${contentHTML}</div>`;
            setTimeout(() => speak(hanzi, getLangCode()), 300);
        }

        function renderQuiz(pinyin, hanzi, meaning, rawLines) {
            const stage = document.getElementById('game-stage');
            const isChineseSub = ['BC', 'SJ', 'SC'].includes(currentSub);
            const isBM = currentSub === 'BM';

            stage.innerHTML = `
                <div class="flex flex-col items-center w-full max-w-5xl">
                    <button id="quiz-sound-btn" class="bg-white/20 p-8 rounded-full hover:bg-white/40 transition mb-12 pointer-events-auto">
                        <span style="font-size: 5vh;">🔊</span>
                    </button>
                    <div id="quiz-display" class="flex flex-col items-center mb-10 text-center w-full px-4">
                        ${isChineseSub ? `
                            <div class="pinyin-text text-5xl mb-3 font-bold uppercase outline-shadow">${pinyin}</div>
                            ${meaning ? `<div class="meaning-text text-3xl opacity-90 outline-shadow">${meaning}</div>` : ''}
                        ` : (isBM ? '' : `<div class="text-white text-6xl font-bold uppercase outline-shadow">${currentSub==='BI' ? meaning : pinyin}</div>`)}
                    </div>
                    <div id="quiz-options" class="grid grid-cols-2 gap-8 w-full relative z-20 pb-16"></div>
                </div>
            `;

            const sBtn = document.getElementById('quiz-sound-btn');
            sBtn.onclick = () => speak(hanzi, getLangCode());
            
            const grid = document.getElementById('quiz-options');
            let target = isBM ? meaning : (isChineseSub ? hanzi : (currentSub==='BI' ? meaning : pinyin));
            
            let opts = [target]; 
            while(opts.length < 2) {
                let rLine = rawLines[Math.floor(Math.random()*rawLines.length)];
                let rM, rH;
                if (rLine.includes(',')) { [rM, rH] = rLine.split(',').map(s => s.trim()); }
                else { rH = rLine.trim(); rM = rH; }
                let rVal = isBM ? rM : (isChineseSub ? rH : (currentSub==='BI' ? rM : autoPinyin(rH)));
                if(!opts.includes(rVal)) opts.push(rVal);
            }
            
            opts.sort(() => Math.random() - 0.5).forEach(o => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-8 rounded-[3rem] text-[6vh] font-black shadow-2xl active:scale-95 transition-transform pointer-events-auto text-gray-800 border-b-8 border-gray-200 flex justify-center items-center";
                if (isBM) {
                    const pair = rawLines.find(l => l.includes(o));
                    const rawSuku = pair ? pair.split(',')[0].trim() : o;
                    btn.innerHTML = getColoredSukuKata(rawSuku, true);
                    btn.className += " uppercase tracking-normal";
                } else { btn.innerText = o.toUpperCase(); }
                btn.onclick = () => checkQuiz(o === target);
                grid.appendChild(btn);
            });
            setTimeout(() => sBtn.click(), 500);
        }

        function checkQuiz(correct) {
            const fb = document.getElementById('feedback'); if(!fb) return;
            fb.style.opacity = '1';
            fb.innerText = correct ? getUI('betul') : getUI('salah');
            fb.style.color = correct ? "#4ade80" : "#f87171";
            if(correct) { correctCount++; setTimeout(() => renderLevel(1), 1200); }
            else { setTimeout(() => { if(fb) fb.style.opacity = '0'; }, 1200); }
        }

        function renderEnd(total) {
            const stage = document.getElementById('game-stage');
            stage.innerHTML = `<div class="text-center text-white"><div class="text-7xl font-black mb-10 uppercase">SELESAI</div>
                <div class="text-[12vh] leading-none mb-10 outline-shadow">${correctCount} / ${total}</div>
                <button onclick="exitGameAndStopAudio()" class="bg-white text-blue-900 px-20 py-6 rounded-full text-4xl font-black shadow-2xl pointer-events-auto">KEMBALI</button></div>`;
        }

        function scrambleSukuKata(text) {
            if (!text || !text.includes('-')) return text;
            const parts = text.split('-');
            let scrambled;
            do { scrambled = [...parts].sort(() => Math.random() - 0.5); } while (scrambled.join('-') === text && parts.length > 1);
            return scrambled.join('-');
        }

        // PDF 导出功能优化
        function openPrintPreview() {
            if(currentFolderIdx === -1) return;
            const f = masterData[currentSub][currentFolderIdx];
            const rawLines = f.content.split('\n').filter(l => l.trim() !== '');
            const isChineseSub = ['BC', 'SJ', 'SC'].includes(currentSub);
            const isBM = currentSub === 'BM';

            const map = rawLines.map(line => {
                let suku, full;
                if (line.includes(',')) { [suku, full] = line.split(',').map(s => s.trim()); }
                else { full = line.trim(); suku = full; }
                return { 
                    originalSuku: suku, 
                    scrambledSuku: isBM ? scrambleSukuKata(suku) : suku, 
                    ans: full, 
                    pinyin: autoPinyin(full) 
                };
            });

            const bilLabel = isBM ? "Bil" : getUI('bil');
            const qLabel = isBM ? "Soalan" : getUI('question');
            const aLabel = isBM ? "Jawapan" : getUI('answer');
            const metaName = isBM ? "Nama" : "姓名";
            const metaClass = isBM ? "Kelas" : "班级";

            // 分页辅助函数 (每页 20 条)
            const chunkArray = (arr, size) => {
                const res = [];
                for (let i = 0; i < arr.length; i += size) res.push(arr.slice(i, i + size));
                return res;
            };

            const dataChunks = chunkArray(map, 20);
            let finalHtml = '';

            // 第一部分：温习笔记 (Nota Pembelajaran)
            dataChunks.forEach((chunk, pageIdx) => {
                finalHtml += `
                <div class="print-page">
                    <div class="print-header">
                        <h1 style="margin:0; font-size:20pt;">Programme PRU - SJK(C) Chung San</h1>
                        <h2 style="margin:5pt 0; font-size:16pt;">Subjek: ${currentSub} | Unit: ${f.name}</h2>
                    </div>
                    <div class="print-meta"><span>${metaName}: ________________</span><span>${metaClass}: ________</span></div>
                    <div class="page-title">Nota Pembelajaran ${dataChunks.length > 1 ? `(Page ${pageIdx + 1})` : ''}</div>
                    <table class="print-table">
                        <thead><tr style="background:#eee;"><th>${bilLabel}</th><th>${qLabel} (Scrambled)</th><th>${aLabel} (Full)</th></tr></thead>
                        <tbody>${chunk.map((it, i) => { 
                            let qContent = isBM ? it.scrambledSuku.toLowerCase() : (isChineseSub ? `<span class="print-pinyin">${it.pinyin}</span>${it.originalSuku !== it.ans ? `<span class="print-meaning">${it.originalSuku}</span>` : ''}` : it.originalSuku);
                            let aContent = isBM ? it.ans.toLowerCase() : (isChineseSub ? `<span class="print-hanzi">${it.ans}</span>` : it.ans);
                            return `<tr><td width="10%">${(pageIdx * 20) + i + 1}</td><td width="50%">${qContent}</td><td>${aContent}</td></tr>` 
                        }).join('')}</tbody>
                    </table>
                </div>`;
            });

            // 第二部分：自修练习 (Latihan Kendiri / Kuiz)
            dataChunks.forEach((chunk, pageIdx) => {
                finalHtml += `
                <div class="print-page">
                    <div class="print-header">
                        <h1 style="margin:0; font-size:20pt;">Programme PRU - SJK(C) Chung San</h1>
                        <h2 style="margin:5pt 0; font-size:16pt;">Subjek: ${currentSub} | Unit: ${f.name}</h2>
                    </div>
                    <div class="print-meta"><span>${metaName}: ________________</span><span>${metaClass}: ________</span></div>
                    <div class="page-title">Latihan Kendiri / Kuiz ${dataChunks.length > 1 ? `(Page ${pageIdx + 1})` : ''}</div>
                    <table class="print-table">
                        <thead><tr style="background:#eee;"><th>${bilLabel}</th><th>${qLabel} (Scrambled)</th><th>${aLabel}</th></tr></thead>
                        <tbody>${chunk.map((it, i) => {
                             let qContent = isBM ? it.scrambledSuku.toLowerCase() : (isChineseSub ? `<span class="print-pinyin">${it.pinyin}</span>` : it.originalSuku);
                             return `<tr><td style="height:55px;">${(pageIdx * 20) + i + 1}</td><td>${qContent}</td><td></td></tr>`
                        }).join('')}</tbody>
                    </table>
                </div>`;
            });

            document.getElementById('print-preview-content').innerHTML = finalHtml;
            document.getElementById('print-modal').classList.remove('hidden-panel');
        }

        function executePrint() { 
            document.getElementById('print-section').innerHTML = document.getElementById('print-preview-content').innerHTML;
            window.print(); 
        }
        function closePrintModal() { document.getElementById('print-modal').classList.add('hidden-panel'); }
        function toggleManager() { document.getElementById('manager-modal').classList.toggle('hidden-panel'); renderManagerTabs(); renderManagerFolders(); }
        function renderManagerTabs() {
            const tabs = document.getElementById('category-tabs'); tabs.innerHTML = '';
            Object.keys(masterData).forEach(s => {
                const b = document.createElement('button'); b.className = `px-6 py-2 rounded-xl font-bold transition ${activeEditSub===s?'bg-blue-600 text-white shadow-md':'bg-white text-gray-400 border border-gray-100'}`;
                b.innerText = s; b.onclick = () => { activeEditSub = s; activeEditIdx = 0; renderManagerTabs(); renderManagerFolders(); loadArea(); };
                tabs.appendChild(b);
            });
        }
        function renderManagerFolders() {
            const list = document.getElementById('manager-folder-list'); list.innerHTML = '';
            masterData[activeEditSub].forEach((f, i) => {
                const d = document.createElement('div'); d.className = `p-4 rounded-xl cursor-pointer ${activeEditIdx===i?'bg-blue-50 text-blue-600 border-l-8 border-blue-600 font-black':'bg-gray-50 border border-transparent'}`;
                d.innerText = f.name; d.onclick = () => { activeEditIdx = i; renderManagerFolders(); loadArea(); };
                list.appendChild(d);
            });
        }
        function loadArea() { document.getElementById('edit-area').value = masterData[activeEditSub][activeEditIdx].content; }
        function saveChanges() { masterData[activeEditSub][activeEditIdx].content = document.getElementById('edit-area').value; showToast("OK"); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(()=>t.style.opacity='0', 2000); }
        function addFolder() { const n = prompt("单元名称:"); if(n) { masterData[activeEditSub].push({name:n, content:''}); activeEditIdx = masterData[activeEditSub].length-1; renderManagerFolders(); loadArea(); } }
        function speak(t, l, onEndCallback) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = l; m.rate = 0.55; if (onEndCallback) m.onend = onEndCallback; window.speechSynthesis.speak(m); }
    </script>
</body>
</html>
