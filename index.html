        /* 核心布局：应用最大化，禁止滚动 */
        :root {
            --tv-safe-gap: 3.5vw;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            background-color: #000;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;

        .font-pru-main { font-family: 'Playfair Display', serif; }
        .font-pru-accent { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
        
        /* 铺满视口的容器 */
        .app-maximizer {
            width: 100vw;
            height: 100vh;
            position: fixed;
            inset: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 渐变背景 */
        .bg-home { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .bg-bm { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .bg-bc { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .bg-bi { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .bg-mt { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-sc { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .bg-sj { background: linear-gradient(135deg, #e6b980 0%, #eacda3 100%); }

        .card-pop { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card-pop:hover { transform: scale(1.03); }

        .hidden-panel { display: none !important; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }

        .suku-kata-btn.active-correct { transform: scale(0.9); opacity: 0.15; pointer-events: none; }
        
        /* 电视巨型文字：核心内容大小 */
        .giant-text { 
            font-size: min(16vw, 32vh); 
            line-height: 0.95; 
            font-weight: 900; 
            text-shadow: 0 12px 36px rgba(0,0,0,0.12);
        }
        .sub-giant-text { 
            font-size: min(7vw, 13vh); 
            font-weight: 700; 
            opacity: 0.75;
            margin-bottom: 1.5rem;
        }

        /* 四角交互控制按钮 */
        .control-btn {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            padding: 1.4vh 3.2vw;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 2vh;
            box-shadow: 0 12px 28px rgba(0,0,0,0.14);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid white;
            white-space: nowrap;
        }
        .control-btn:active { transform: scale(0.9); }
        .control-btn:hover { background: white; transform: translateY(-4px); }

        /* 四角定位系统 */
        .tv-corner { position: absolute; z-index: 50; }
        .top-l { top: var(--tv-safe-gap); left: var(--tv-safe-gap); }
        .top-r { top: var(--tv-safe-gap); right: var(--tv-safe-gap); }
        .bottom-l { bottom: var(--tv-safe-gap); left: var(--tv-safe-gap); }
        .bottom-r { bottom: var(--tv-safe-gap); right: var(--tv-safe-gap); }
        .top-center { top: var(--tv-safe-gap); left: 50%; transform: translateX(-50%); }

        /* AI 加载旋转 */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #d97706;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            @page { size: A4 portrait; margin: 2cm; }
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; display: block !important; background: white; }
        }

    <script>
        // --- Gemini API ---
        const apiKey = ""; 

        async function callGemini(prompt, systemInstruction = "你是专业的教育助手") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            let retries = 5, delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error('API request failed');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        // --- 数据结构 ---
        let masterData = {
            'BM': [{ name: "Unit 1", content: "se-ko-lah,sekolah\nbu-ku,buku\nme-ja,meja" }],
            'BC': [{ name: "生词 A", content: "píng guǒ,苹果\nlǎo shī,老师\nxué xiào,学校" }],
            'BI': [{ name: "Vocab 1", content: "School,学校\nApple,苹果" }],
            'MT': [{ name: "乘法", content: "2x2,4\n3x3,9\n5x2,10" }],
            'SC': [{ name: "科学 1", content: "Paru-paru,肺" }],
            'SJ': [{ name: "历史 1", content: "Sejarah,历史" }]
        };

        const locales = {
            'BM': { selectUnit: 'Pilih Unit', quizMode: 'Cabaran', studyMode: 'Belajar', printBtn: 'Simpan PDF (A4)', backHome: '🏠 返回首页', backSubject: '⬅ Kembali', backFolder: '⬅ Kembali', progress: 'Progres', nextBtn: 'Seterusnya', speakBtn: 'Sebut', aiBtn: '✨ AI Analisis', correct: '🌟 BETUL!', wrong: '❌ SALAH!', done: 'SELESAI!' },
            'BI': { selectUnit: 'Select Unit', quizMode: 'Challenge', studyMode: 'Study', printBtn: 'Save PDF (A4)', backHome: '🏠 返回首页', backSubject: '⬅ Back', backFolder: '⬅ Back', progress: 'Progress', nextBtn: 'Next', speakBtn: 'Speak', aiBtn: '✨ AI Explain', correct: '🌟 CORRECT!', wrong: '❌ WRONG!', done: 'DONE!' },
            'CN': { selectUnit: '选择单元', quizMode: '闯关模式', studyMode: '学习模式', printBtn: '保存 PDF (A4)', backHome: '🏠 返回首页', backSubject: '⬅ 返回', backFolder: '⬅ 返回', progress: '进度', nextBtn: '下一个', speakBtn: '朗读', aiBtn: '✨ AI 解析', correct: '🌟 正确！', wrong: '❌ 错误！', done: '学习完成！' }
        };

        let currentSubject = '', currentFolderIdx = 0, currentMode = 'quiz', correctCount = 0, playedIndices = [], isFirstAttempt = true, activeEditSubject = 'BM', activeEditFolderIdx = 0, lastStudyWord = { q: '', a: '' };
        const sukuColors = ['text-blue-600', 'text-red-600', 'text-green-600', 'text-orange-600', 'text-purple-600'];

        function getLocale() { return (currentSubject === 'BM') ? locales['BM'] : (currentSubject === 'BI' ? locales['BI'] : locales['CN']); }

        // --- 导航控制 ---
        function enterSystem() { 
            const landing = document.getElementById('landing-page'), menu = document.getElementById('subject-menu');
            if (landing) landing.classList.add('hidden-panel'); 
            if (menu) menu.classList.remove('hidden-panel'); 
            showSubjectMenu(); 
        }

        function backToLanding() { 
            const landing = document.getElementById('landing-page'), menu = document.getElementById('subject-menu'), game = document.getElementById('game-container');
            if (landing) landing.classList.remove('hidden-panel'); 
            if (menu) menu.classList.add('hidden-panel'); 
            if (game) game.classList.add('hidden-panel'); 
            document.body.className = 'bg-home'; 
        }

        function showSubjectMenu() {
            const menu = document.getElementById('subject-menu'), grid = document.getElementById('subject-grid'), sel = document.getElementById('folder-selection'), game = document.getElementById('game-container'), mBtn = document.getElementById('manager-btn-container');
            if (menu) menu.classList.remove('hidden-panel');
            if (grid) grid.classList.remove('hidden-panel');
            if (sel) sel.classList.add('hidden-panel');
            if (game) game.classList.add('hidden-panel');
            if (mBtn) mBtn.classList.remove('hidden-panel');
            document.body.className = 'bg-home';
        }

        function setMode(mode) {
            currentMode = mode;
            const qBtn = document.getElementById('mode-quiz-btn'), sBtn = document.getElementById('mode-study-btn');
            if (qBtn) qBtn.classList.toggle('active', mode === 'quiz');
            if (sBtn) sBtn.classList.toggle('active', mode === 'study');
        }

        function selectSubject(sub) {
            currentSubject = sub; const loc = getLocale();
            const bh = document.getElementById('nav-back-home'), grid = document.getElementById('subject-grid'), sel = document.getElementById('folder-selection'), mBtn = document.getElementById('manager-btn-container');
            const title = document.getElementById('folder-view-title'), qb = document.getElementById('mode-quiz-btn'), sb = document.getElementById('mode-study-btn'), pb = document.getElementById('print-btn-text');
            
            if (bh && bh.querySelector('span')) bh.querySelector('span').innerText = loc.backHome;
            if (grid) grid.classList.add('hidden-panel');
            if (sel) sel.classList.remove('hidden-panel');
            if (mBtn) mBtn.classList.add('hidden-panel');
            if (title) title.innerText = loc.selectUnit;
            if (qb) qb.innerText = loc.quizMode;
            if (sb) sb.innerText = loc.studyMode;
            if (pb) pb.innerText = loc.printBtn;
            
            const fGrid = document.getElementById('folder-grid'); 
            if (fGrid) {
                fGrid.innerHTML = '';
                masterData[sub].forEach((folder, idx) => {
                    const btn = document.createElement('div');
                    btn.className = "card-pop bg-white p-12 rounded-[3.5rem] shadow-2xl border-4 border-gray-100 text-center font-black text-4xl text-gray-700 flex flex-col justify-between h-72";
                    btn.innerHTML = `<span class="mt-4">${folder.name}</span>`;
                    btn.onclick = () => { 
                        currentFolderIdx = idx;
                        document.querySelectorAll('#folder-grid > div').forEach(d => d.classList.remove('border-blue-500', 'bg-blue-50'));
                        btn.classList.add('border-blue-500', 'bg-blue-50');
                        const gpb = document.getElementById('global-print-btn');
                        if (gpb) gpb.classList.remove('hidden-panel');
                        btn.ondblclick = () => startGame(idx);
                    };
                    const play = document.createElement('div');
                    play.className = "text-xl bg-blue-600 text-white py-4 rounded-2xl uppercase tracking-widest font-black";
                    play.innerText = (sub === 'BM' || sub === 'BI') ? "START" : "开始";
                    play.onclick = (e) => { e.stopPropagation(); startGame(idx); };
                    btn.appendChild(play); fGrid.appendChild(btn);
                });
            }
        }

        function startGame(idx) {
            currentFolderIdx = idx; correctCount = 0; playedIndices = []; const loc = getLocale();
            const m = document.getElementById('subject-menu'), g = document.getElementById('game-container'), t = document.getElementById('game-title'), bt = document.getElementById('nav-back-folder-text'), pt = document.getElementById('progress-text'), st = document.getElementById('speak-btn-text'), nt = document.getElementById('next-btn-text'), at = document.getElementById('ai-btn-text');
            if (m) m.classList.add('hidden-panel');
            if (g) g.classList.remove('hidden-panel');
            document.body.className = `bg-${currentSubject.toLowerCase()}`;
            if (t) t.innerText = getGameName(currentSubject);
            if (bt) bt.innerText = loc.backFolder;
            if (pt) pt.innerText = loc.progress;
            if (st) st.innerText = loc.speakBtn;
            if (nt) nt.innerText = loc.nextBtn;
            if (at) at.innerText = loc.aiBtn || "AI 解析";
            renderLevel();
        }

        function getGameName(sub) { return {'BM':'Bahasa Melayu','BC':'Bahasa Cina','BI':'Bahasa Inggeris','MT':'Matematik','SC':'Sains','SJ':'Sejarah'}[sub]; }

        // --- 渲染逻辑 ---
        function renderLevel() {
            const stage = document.getElementById('game-stage'), fb = document.getElementById('feedback'), sa = document.getElementById('speak-action-container'), aa = document.getElementById('ai-study-action-container'), na = document.getElementById('next-action-container'), pv = document.getElementById('progress-val');
            if (!stage) return;
            stage.innerHTML = ''; if (fb) fb.innerText = ''; isFirstAttempt = true; 
            if (sa) sa.className = 'invisible'; if (aa) aa.className = 'invisible'; if (na) na.className = 'invisible';

            const folder = masterData[currentSubject][currentFolderIdx], raw = folder.content.split('\n').filter(l => l.trim().includes(',')), total = raw.length;
            if (playedIndices.length >= total) { renderGameComplete(total); return; }
            if (pv) pv.innerText = `${playedIndices.length + 1}/${total}`;

            let nextIdx = (currentMode === 'study') ? playedIndices.length : (() => { let av = []; for(let i=0; i<total; i++) if(!playedIndices.includes(i)) av.push(i); return av[Math.floor(Math.random()*av.length)]; })();
            const [q, a] = raw[nextIdx].split(',').map(s => s.trim());
            lastStudyWord = { q, a };

            if (currentMode === 'study') renderStudyView(q, a);
            else {
                playedIndices.push(nextIdx);
                if (currentSubject === 'BC') renderBCLevel(q, a, raw);
                else if (currentSubject === 'BI') renderBILevel(q, a); 
                else if (currentSubject === 'BM') renderBMLevel(q, a);
                else if (currentSubject === 'MT') renderMTLevel(q, a);
                else renderStandardLevel(q, a, raw);
            }
        }

        function renderStudyView(q, a) {
            const s = document.getElementById('game-stage'), sa = document.getElementById('speak-action-container'), aa = document.getElementById('ai-study-action-container'), na = document.getElementById('next-action-container'), sb = document.getElementById('speak-btn'), ab = document.getElementById('ai-explain-btn'), nb = document.getElementById('next-btn');
            let h = '', t = '', l = 'zh-CN';
            if (currentSubject === 'BC') { h = `<div class="sub-giant-text text-white/50">${q}</div><div class="giant-text text-white">${a}</div>`; t = a; }
            else if (currentSubject === 'MT') { h = `<div class="giant-text text-white">${q} = ${a}</div>`; t = `${q} 等于 ${a}`; }
            else if (currentSubject === 'BM') { h = `<div class="sub-giant-text text-white/50 uppercase">${q}</div><div class="giant-text text-white uppercase">${a}</div>`; t = a; l = 'ms-MY'; }
            else if (currentSubject === 'BI') { h = `<div class="giant-text text-white uppercase">${q}</div><div class="sub-giant-text text-white/50 uppercase">${a}</div>`; t = q; l = 'en-SG'; }
            else { h = `<div class="giant-text text-white uppercase">${q}</div><div class="sub-giant-text text-white/50 uppercase">${a}</div>`; t = q; }
            if (s) s.innerHTML = `<div class="animate-score text-center">${h}</div>`;
            if (sa) sa.className = 'visible'; if (aa) aa.className = 'visible'; if (na) na.className = 'visible';
            if (sb) sb.onclick = () => speak(t, l);
            if (ab) ab.onclick = () => showAIExplain();
            if (nb) nb.onclick = () => { playedIndices.push(playedIndices.length); renderLevel(); };
            setTimeout(() => speak(t, l), 400);
        }

        function renderBMLevel(suku, full) {
            const stage = document.getElementById('game-stage'), sa = document.getElementById('speak-action-container'), sb = document.getElementById('speak-btn');
            let step = 0; const parts = suku.split('-');
            const reveal = document.createElement('div');
            reveal.className = "giant-text flex gap-12 opacity-0 transition-all duration-500 mb-20 justify-center";
            parts.forEach((p, i) => { const s = document.createElement('span'); s.className = sukuColors[i % 5]; s.innerText = p.toUpperCase(); reveal.appendChild(s); });
            if (stage) stage.appendChild(reveal);
            const box = document.createElement('div'); box.className = "flex gap-12 flex-wrap justify-center";
            [...parts].sort(() => Math.random()-0.5).forEach(p => {
                const b = document.createElement('button');
                b.className = `px-20 py-12 rounded-[4.5rem] text-[10rem] font-black shadow-2xl bg-white border-8 border-white active:scale-90 transition ${sukuColors[parts.indexOf(p)%5]}`;
                b.innerText = p.toLowerCase();
                b.onclick = () => {
                    if (p === parts[step]) { b.classList.add('active-correct'); step++; if(step === parts.length) { reveal.classList.remove('opacity-0'); if(isFirstAttempt) correctCount++; showFeedback(true); setTimeout(renderLevel, 2000); } }
                    else { isFirstAttempt = false; b.classList.add('bg-red-200'); setTimeout(()=>b.classList.remove('bg-red-200'),400); speak(full, 'ms-MY'); }
                };
                box.appendChild(b);
            });
            if (stage) stage.appendChild(box);
            if (sa) sa.className = 'visible'; if (sb) sb.onclick = () => speak(full, 'ms-MY');
            setTimeout(() => speak(full, 'ms-MY'), 500);
        }

        function renderBCLevel(pin, han, raw) {
            const stage = document.getElementById('game-stage'), sa = document.getElementById('speak-action-container'), sb = document.getElementById('speak-btn');
            if (stage) stage.innerHTML = `<div class="sub-giant-text text-white/50 mb-10 uppercase tracking-widest">${pin}</div>`;
            const grid = document.createElement('div'); grid.className = "grid grid-cols-2 gap-20 w-full max-w-[85vw]";
            let opts = [han]; while(opts.length < 2) { let r = raw[Math.floor(Math.random()*raw.length)].split(',')[1].trim(); if(!opts.includes(r)) opts.push(r); }
            opts.sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button'); b.className = "bg-white p-20 rounded-[6rem] text-[22rem] font-black shadow-2xl border-8 border-white/40 active:scale-95 transition leading-none";
                b.innerText = o; b.onclick = () => checkResult(o === han); grid.appendChild(b);
            });
            if (stage) stage.appendChild(grid);
            if (sa) sa.className = 'visible'; if (sb) sb.onclick = () => speak(han, 'zh-CN');
            setTimeout(()=>speak(han,'zh-CN'), 500);
        }

        function renderBILevel(word, mean) {
            const stage = document.getElementById('game-stage'), sa = document.getElementById('speak-action-container'), sb = document.getElementById('speak-btn');
            if (stage) stage.innerHTML = `<div class="sub-giant-text text-white/40 italic mb-10 font-bold uppercase tracking-widest">(${mean})</div>`;
            const grid = document.createElement('div'); grid.className = "grid grid-cols-2 gap-20 w-full max-w-[85vw]";
            let dist = word.length > 3 ? word.slice(0,-1) : word+word.slice(-1);
            let opts = [word, dist].sort(()=>Math.random()-0.5);
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = "bg-white p-20 rounded-[6rem] text-[18rem] font-black shadow-2xl border-8 border-white/40 active:scale-95 transition uppercase leading-none";
                b.innerText = o; b.onclick = () => checkResult(o === word); grid.appendChild(b);
            });
            if (stage) stage.appendChild(grid);
            if (sa) sa.className = 'visible'; if (sb) sb.onclick = () => speak(word, 'en-SG');
            setTimeout(()=>speak(word,'en-SG'), 500);
        }

        function renderMTLevel(q, a) {
            const stage = document.getElementById('game-stage');
            if (stage) stage.innerHTML = `<div class="giant-text text-white drop-shadow-2xl mb-24">${q} = ?</div>`;
            const grid = document.createElement('div'); grid.className = "grid grid-cols-2 gap-16 w-full max-w-[70vw]";
            let opts = [a]; while(opts.length < 4) { let r = Math.floor(Math.random()*100).toString(); if(!opts.includes(r)) opts.push(r); }
            opts.sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button'); b.className = "bg-white p-16 rounded-[5rem] text-[12rem] font-black shadow-2xl active:scale-90 transition leading-none";
                b.innerText = o; b.onclick = () => checkResult(o === a); grid.appendChild(b);
            });
            if (stage) stage.appendChild(grid);
        }

        function renderStandardLevel(q, a, raw) {
            const stage = document.getElementById('game-stage');
            if (stage) stage.innerHTML = `<div class="giant-text text-white mb-20 drop-shadow-2xl">${q} = ?</div>`;
            const grid = document.createElement('div'); grid.className = "grid grid-cols-2 gap-16 w-full max-w-[85vw]";
            let opts = [a]; while(opts.length < 4) { let r = raw[Math.floor(Math.random()*raw.length)].split(',')[1].trim(); if(!opts.includes(r)) opts.push(r); }
            opts.sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button'); b.className = "bg-white p-14 rounded-[5rem] text-[10rem] font-black shadow-2xl active:scale-90 transition leading-none";
                b.innerText = o; b.onclick = () => checkResult(o === a); grid.appendChild(b);
            });
            if (stage) stage.appendChild(grid);
        }

        // --- AI 助手 ---
        async function showAIExplain() {
            const m = document.getElementById('ai-assistant-modal'), l = document.getElementById('ai-loading'), c = document.getElementById('ai-content');
            if (m) m.classList.remove('hidden-panel'); if (l) l.classList.remove('hidden'); if (c) c.classList.add('hidden');
            try {
                const p = `针对一年级学生，请为词语 "${lastStudyWord.q}" (意思是 "${lastStudyWord.a}") 生成有趣的AI解析。包含例句和趣味窍门。使用${currentSubject === 'BM' ? '马来语和中文' : (currentSubject === 'BI' ? '英语和中文' : '中文')}。`;
                const r = await callGemini(p);
                if (c) { c.innerText = r; c.classList.remove('hidden'); } if (l) l.classList.add('hidden');
            } catch (e) { if (c) { c.innerText = "解析暂不可用。"; c.classList.remove('hidden'); } if (l) l.classList.add('hidden'); }
        }
        function closeAIModal() { document.getElementById('ai-assistant-modal').classList.add('hidden-panel'); }

        async function generateAIQuestions() {
            const a = document.getElementById('edit-area'), f = masterData[activeEditSubject][activeEditFolderIdx];
            if (!a || !f) return; const o = a.value; a.value = "✨ AI 正在为您生成内容..."; a.disabled = true;
            try {
                const p = `请为 ${activeEditSubject} 学科单元 "${f.name}" 生成10组练习。格式：提问,答案。例如：苹果,apple。`;
                const r = await callGemini(p, "你是教材专家"); a.value = r.trim();
            } catch (e) { a.value = o; showToast("生成失败。"); } finally { a.disabled = false; }
        }

        // --- 工具 ---
        function checkResult(c) {
            showFeedback(c);
            if (c) { if(isFirstAttempt) correctCount++; setTimeout(renderLevel, 1200); }
            else { isFirstAttempt = false; }
        }
        function showFeedback(c) {
            const l = getLocale(), f = document.getElementById('feedback');
            if (f) { f.innerText = c ? l.correct : l.wrong; f.style.transform = "scale(2.2)"; setTimeout(()=> f.style.transform = "scale(1)", 400); }
        }
        function renderGameComplete(t) {
            const s = document.getElementById('game-stage'), l = getLocale(), p = (correctCount === t);
            if (s) { s.innerHTML = `<div class="animate-score text-center flex flex-col items-center">
                <div class="text-8xl font-black mb-10 text-white">${l.done}</div>
                <div class="text-[25rem] font-black leading-none drop-shadow-2xl flex items-baseline text-white mb-10">
                    <span class="${p ? 'text-yellow-300' : 'text-blue-100'}">${correctCount}</span>
                    <span class="text-9xl mx-16 font-normal">/</span>
                    <span class="text-[12rem] text-white/50">${t}</span>
                </div>
                <button onclick="showSubjectMenu()" class="bg-white text-blue-900 px-32 py-12 rounded-full text-7xl font-black shadow-2xl hover:scale-110 transition active:scale-95">➔ OK</button>
            </div>`; }
        }
        function speak(t, l) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const m = new SpeechSynthesisUtterance(t);
                const v = window.speechSynthesis.getVoices();
                let sv = v.find(v => v.lang.toLowerCase().includes(l.toLowerCase()) && v.name.toLowerCase().includes('female')) || v.find(v => v.lang.toLowerCase().includes(l.toLowerCase()));
                if(sv) m.voice = sv; m.lang = l; m.rate = 0.7; window.speechSynthesis.speak(m);
            }
        }

        // --- 管理中心 ---
        function toggleManager() { const m = document.getElementById('manager-modal'); if (m) { m.classList.toggle('hidden-panel'); if(!m.classList.contains('hidden-panel')) { renderManagerTabs(); renderFolderList(); loadEditArea(); } } }
        function renderManagerTabs() { const c = document.getElementById('category-tabs'); if (c) { c.innerHTML = ''; Object.keys(masterData).forEach(s => { const b = document.createElement('button'); b.className = `px-8 py-3 rounded-2xl font-black text-xl transition ${activeEditSubject === s ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`; b.innerText = s; b.onclick = () => { activeEditSubject = s; activeEditFolderIdx = 0; renderManagerTabs(); renderFolderList(); loadEditArea(); }; c.appendChild(b); }); } }
        function renderFolderList() { const l = document.getElementById('manager-folder-list'); if (l) { l.innerHTML = ''; masterData[activeEditSubject].forEach((f, i) => { const it = document.createElement('div'); it.className = `p-4 rounded-2xl cursor-pointer font-bold ${activeEditFolderIdx === i ? 'bg-blue-50 text-blue-600 border-l-8 border-blue-600' : 'text-gray-600'}`; it.innerText = f.name; it.onclick = () => { activeEditFolderIdx = i; renderFolderList(); loadEditArea(); }; l.appendChild(it); }); } }
        function loadEditArea() { const f = masterData[activeEditSubject][activeEditFolderIdx]; const a = document.getElementById('edit-area'), b = document.getElementById('rename-folder-btn'); if (a) a.value = f ? f.content : ""; if (b) b.innerText = `Rename: ${f ? f.name : ''}`; }
        function saveChanges() { masterData[activeEditSubject][activeEditFolderIdx].content = document.getElementById('edit-area').value; toggleManager(); showToast(); if(!document.getElementById('folder-selection').classList.contains('hidden-panel')) selectSubject(currentSubject); }
        function addFolder() { const n = prompt("Unit Name:"); if(n) { masterData[activeEditSubject].push({name:n, content:""}); activeEditFolderIdx = masterData[activeEditSubject].length-1; renderFolderList(); loadEditArea(); } }
        function renameCurrentFolder() { const f = masterData[activeEditSubject][activeEditFolderIdx]; const n = prompt("New Name:", f.name); if(n) { f.name = n; renderFolderList(); loadEditArea(); } }
        function deleteCurrentFolder() { if(confirm("Delete Unit?")) { masterData[activeEditSubject].splice(activeEditFolderIdx, 1); if(!masterData[activeEditSubject].length) masterData[activeEditSubject].push({name:"Unit 1", content:""}); activeEditFolderIdx = 0; renderFolderList(); loadEditArea(); } }
        function showToast(m) { const t = document.getElementById('toast'); if (t) { t.innerText = m || "✅ 已保存"; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } }
        function openPrintPreview() {
            const f = masterData[currentSubject][currentFolderIdx], raw = f.content.split('\n').filter(l => l.trim().includes(','));
            let h = `<div style="text-align:center; border-bottom:3pt solid #333; margin-bottom:30px;"><h1 style="margin:0; font-size:26pt;">PRU - 实巴荷中山学校</h1><h2 style="margin:10pt 0; font-size:18pt;">${getGameName(currentSubject)} - ${f.name}</h2></div><table style="width:100%; border-collapse:collapse; font-size:13pt; border:1.5pt solid #000;"><thead><tr style="background:#f2f2f2;"><th style="border:1pt solid #000; padding:12pt; width:60pt;">#</th><th style="border:1pt solid #000; padding:12pt; text-align:left;">Soalan</th><th style="border:1pt solid #000; padding:12pt; text-align:left;">Jawapan</th></tr></thead><tbody>`;
            raw.forEach((l, i) => { const [q, a] = l.split(',').map(s => s.trim()); h += `<tr><td style="border:1pt solid #000; padding:12pt; text-align:center;">${i+1}</td><td style="border:1pt solid #000; padding:12pt; font-weight:bold;">${q}</td><td style="border:1pt solid #000; padding:12pt;">${a}</td></tr>`; });
            h += `</tbody></table>`; document.getElementById('print-preview-content').innerHTML = h; document.getElementById('print-modal').classList.remove('hidden-panel');
        }
        function closePrintModal() { document.getElementById('print-modal').classList.add('hidden-panel'); }
        function executePrint() { document.getElementById('print-section').innerHTML = document.getElementById('print-preview-content').innerHTML; window.print(); }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
